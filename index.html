<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo Brillare Jóias</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="header">

    <div class="titulo">
        <h1>Brillare Jóias</h1>
        <p>Elegância e brilho para todos os momentos ✨</p>
    </div>

    <div class="acoes-header">

        <button id="modoNoturno">🌙</button>

        <div class="carrinho-icone" onclick="toggleCarrinho()">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="contadorCarrinho">0</span>
        </div>

    </div>

</header>

<div class="container">

    <div class="produto">

        <img src="images/bolsaSimples.jpg" alt="Bolsa">

        <h3 class="nomeProduto">Bolsa</h3>

        <p class="preco">R$ 60,00</p>

        <button class="botao"
        onclick="adicionarCarrinho('Bolsa',60)">
        Adicionar ao Carrinho
        </button>

    </div>

    <div class="produto">

        <img src="images/correntes.jpg" alt="Correntinha">

        <h3 class="nomeProduto">Correntinha</h3>

        <p class="preco">R$ 120,00</p>

        <button class="botao"
        onclick="adicionarCarrinho('Correntinha',120)">
        Adicionar ao Carrinho
        </button>

    </div>

    <div class="produto">

        <img src="images/colarFeminino.jpg" alt="Colar Feminino">

        <h3 class="nomeProduto">Colar Feminino</h3>

        <p class="preco">R$ 95,00</p>

        <button class="botao"
        onclick="adicionarCarrinho('Colar Feminino',95)">
        Adicionar ao Carrinho
        </button>

    </div>

</div>


<div id="carrinhoPreview">

<h3>🛒 Seu Carrinho</h3>

<div id="listaCarrinho"></div>

<p id="totalCarrinho">Total: R$ 0</p>

<button onclick="finalizarCompra()" class="botao-finalizar">
Finalizar no WhatsApp
</button>

</div>


<a href="https://wa.me/5562999230895"
class="whatsapp-fixo"
target="_blank">

<i class="fa-brands fa-whatsapp"></i>

</a>


<div id="notificacao"></div>


<footer class="footer">

<p>Desenvolvido por <strong>Plínio Peixoto dos Santos</strong></p>

<div class="redes">

<a href="https://wa.me/5562998406502" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
</a>

<a href="https://instagram.com/pliniops_" target="_blank">
<i class="fa-brands fa-instagram"></i>
</a>

</div>

</footer>

<script src="script.js"></script>

</body>
</html>
